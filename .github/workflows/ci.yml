name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install
      - name: Check code formatting & lint
        run: bun run lint || true
      - name: Build
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/priisme"
          BETTER_AUTH_SECRET: "ci-secret"
          BETTER_AUTH_BASE_URL: "http://localhost:3000"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install
      - name: Run Unit Tests
        run: bun test
